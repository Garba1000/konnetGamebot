<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spin & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}
.section {
  margin-top: 20px;
  padding: 15px;
  background: #111;
  border-radius: 10px;
}
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 8px;
  background: #00c853;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
}
.hidden { display: none; }
canvas { border-radius: 10px; display: block; margin: 10px auto; }

#joinPopup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  z-index: 9999;
}
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<!-- JOIN POPUP -->
<div id="joinPopup">
  <h2>📢 Join Our Telegram Channel</h2>
  <p>You must join to continue.</p>
  <button onclick="joinChannel()">Join Channel</button>
</div>

<div id="mainPage" style="display:none;">

<h1>⚡ Spin & Earn</h1>
<p>Points: <span id="points">0</span></p>

<!-- SPIN SECTION -->
<div class="section">
  <canvas id="spinCanvas" width="300" height="300"></canvas>
  <p id="spinMsg">🎡 Tap wheel to spin (0/6)</p>
</div>

<!-- TASK SECTION -->
<div class="section">
  <h2>📋 Tasks</h2>
  <div class="btn" id="startTasksBtn">Start Tasks</div>
</div>

<!-- WITHDRAW SECTION -->
<div class="section">
  <h2>💳 Withdraw</h2>
  <p><b>Minimum 250,000 points</b></p>
  <input type="text" id="address" placeholder="Enter wallet address"/>
  <input type="number" id="amount" placeholder="Amount"/>
  <div class="btn" id="withdrawBtn">Withdraw</div>
</div>

</div>

<div id="adsgram-container" class="hidden"></div>

<script>
const webApp = Telegram.WebApp;

let points = parseInt(localStorage.getItem("points") || "0");
function saveState(){ localStorage.setItem("points", points); }
function updateUI(){ document.getElementById("points").innerText = points; }
updateUI();

/* JOIN SYSTEM */
function joinChannel(){
  window.open("https://t.me/crytocurrentupdate","_blank");
  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainPage").style.display="block";
}
document.getElementById("joinPopup").style.display="flex";

/* ================= SPIN SYSTEM ================= */

const rewardBlocks = ["23731","23732","23734"];
const spinTaskBlocks = ["task-23767","task-23768","task-23774","task-23775"];

let spinCount = 0;
let spinning = false;

const canvas = document.getElementById("spinCanvas");
const ctx = canvas.getContext("2d");
const spinMsg = document.getElementById("spinMsg");
const container = document.getElementById("adsgram-container");

let currentRotation = 0;

/* DRAW */
function drawWheel(rotation = 0){
  const segments = 6;
  const angle = (2 * Math.PI) / segments;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(150,150);
  ctx.rotate(rotation);

  for(let i=0;i<segments;i++){
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,140,i*angle,(i+1)*angle);
    ctx.fillStyle = i % 2 === 0 ? "#00c853" : "#222";
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}
drawWheel();

/* SPIN CLICK */
canvas.addEventListener("click", ()=>{
  if(spinning) return;
  spinning = true;

  let spinAngle = Math.random()*360 + 1080;
  let start = null;

  function animate(t){
    if(!start) start=t;
    let progress=t-start;

    if(progress<2500){
      let ease=1-Math.pow(1-progress/2500,3);
      currentRotation=(spinAngle*ease)*Math.PI/180;
      drawWheel(currentRotation);
      requestAnimationFrame(animate);
    }else{
      spinning=false;
      showSpinAd();
    }
  }
  requestAnimationFrame(animate);
});

/* SHOW AD */
function showSpinAd(){
  try{
    const randomBlock=rewardBlocks[Math.floor(Math.random()*rewardBlocks.length)];
    const ad=window.Adsgram.init({blockId:randomBlock});
    ad.show().finally(()=>{
      spinCount++;
      spinMsg.innerText="🎡 Tap wheel to spin ("+spinCount+"/6)";
      if(spinCount>=6) showClaimButton();
    });
  }catch(e){
    spinCount++;
    if(spinCount>=6) showClaimButton();
  }
}

/* CLAIM BUTTON */
function showClaimButton(){
  spinMsg.innerHTML=`
    🎁 6 Spins Completed<br><br>
    <div class="btn" id="claimBtn">Claim 200 Points</div>
  `;
  document.getElementById("claimBtn").onclick=showClaimTask;
}

/* CLAIM TASK */
function showClaimTask(){
  const randomTask=spinTaskBlocks[Math.floor(Math.random()*spinTaskBlocks.length)];
  container.innerHTML=`<adsgram-task class="claim-task" data-block-id="${randomTask}"></adsgram-task>`;
  container.classList.remove("hidden");

  const task=container.querySelector(".claim-task");
  task.addEventListener("reward",()=>{
    points+=200;
    saveState();
    updateUI();

    container.classList.add("hidden");
    spinMsg.innerHTML="🎉 You're successfully received 200 points from Spin & Earn<br><br>Resetting in 30 seconds...";

    setTimeout(resetSpin,30000);
  });
}

/* RESET */
function resetSpin(){
  spinCount=0;
  currentRotation=0;
  drawWheel();
  spinMsg.innerText="🎡 Tap wheel to spin (0/6)";
}

/* ================= NORMAL TASK BUTTON ================= */
document.getElementById("startTasksBtn").addEventListener("click",()=>{
  const randomTask=spinTaskBlocks[Math.floor(Math.random()*spinTaskBlocks.length)];
  container.innerHTML=`<adsgram-task data-block-id="${randomTask}"></adsgram-task>`;
  container.classList.remove("hidden");
});

/* ================= WITHDRAW ================= */
document.getElementById("withdrawBtn").addEventListener("click",()=>{
  const amount=parseInt(document.getElementById("amount").value);
  const address=document.getElementById("address").value.trim();

  if(amount<250000){ alert("Minimum 250,000 points"); return; }
  if(points<amount){ alert("Not enough points"); return; }

  const user=webApp.initDataUnsafe.user||{};
  Telegram.WebApp.sendData(JSON.stringify({
    type:"withdraw",
    user_id:user.id,
    amount,address
  }));

  points-=amount;
  saveState();
  updateUI();
  alert("Withdrawal request sent!");
});
</script>

</body>
</html>
