<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scratch & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}
h1, h2 { margin-bottom: 10px; }
.section { margin-top: 20px; padding: 15px; background: #111; border-radius: 10px; }
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 8px;
  background: #00c853;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
}
.btn:active { transform: scale(0.95); }
.hidden { display: none; }
input, select {
  padding: 8px; margin: 5px 0; width: 100%; border-radius: 5px; border: none;
}
#joinPopup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  z-index: 9999;
}
#joinPopup button {
  background: #00c853;
  color: #fff;
  padding: 12px 20px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
}
canvas { border-radius: 10px; display: block; margin: 10px auto; }
#claimSuccessMsg {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: #00c853;
  color: #fff;
  padding: 15px 20px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 16px;
  display: none;
  z-index: 9999;
  text-align: center;
}
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<div id="joinPopup">
  <h2>📢 Join Our Telegram Channel to Continue</h2>
  <p>You must join before using the app.</p>
  <button onclick="joinChannelClicked()">👉 Join @earnzoners</button>
</div>

<div id="mainPage" style="display:none;">

<h1>⚡ Spin & Earn Points</h1>
<p>Points: <span id="points">0</span> | Energy: <span id="energy">50</span></p>

<div class="section">
  <canvas id="spinCanvas" width="300" height="300"></canvas>
  <p id="scratchMsg">🎡 Tap wheel to spin (0/6)</p>
</div>

<div class="section">
<h2>📋 Tasks</h2>
<div id="taskIntro">
  <div class="btn" id="startTasksBtn">Start Tasks</div>
</div>
<div id="adsgram-container" class="hidden"></div>
<div id="nextTaskBtnContainer" class="hidden">
  <div class="btn" id="nextTaskBtn">➡️ Next Task</div>
</div>
<div id="finalTaskBtnContainer" class="hidden">
  <div class="btn" id="finalTaskBtn">🏁 Finish Tasks</div>
</div>
</div>

<div class="section">
<h2>💳 Withdraw</h2>
<p><b>Minimum withdrawal is 250,000 points (~$59)</b></p>
<select id="method">
<option value="Litecoin">Litecoin</option>
<option value="USDT">USDT</option>
<option value="Payeer">Payeer</option>
<option value="Bank">Bank Account</option>
</select>
<input type="text" id="address" placeholder="Enter wallet or account"/>
<input type="number" id="amount" placeholder="Minimum 250000"/>
<div class="btn" id="withdrawBtn">Request Withdraw</div>
</div>

</div>

<script>
const webApp = Telegram.WebApp;
let points = parseInt(localStorage.getItem("points") || "0");
let energy = parseInt(localStorage.getItem("energy") || "50");

function updateUI(){
  document.getElementById("points").innerText = points;
  document.getElementById("energy").innerText = energy;
}
function saveState(){
  localStorage.setItem("points", points);
  localStorage.setItem("energy", energy);
}

/* JOIN */
function joinChannelClicked(){
  window.open("https://t.me/crytocurrentupdate","_blank");
  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainPage").style.display="block";
}
function showJoinPopupAfterAds(){
  try{
    const rewardAd = window.Adsgram.init({blockId:"23731"});
    rewardAd.show().finally(()=>{
      document.getElementById("joinPopup").style.display="flex";
    });
  }catch(e){
    document.getElementById("joinPopup").style.display="flex";
  }
}

/* ================= SPIN SYSTEM ================= */
const rewardBlocks = ["23731","23732","23734"];
const spinTaskBlocks = ["task-23767","task-23768","task-23774","task-23775"];

let spinCount = 0;
let spinning = false;
let rewardCooldown = false;

const canvas = document.getElementById("spinCanvas");
const ctx = canvas.getContext("2d");
const scratchMsg = document.getElementById("scratchMsg");
const container = document.getElementById("adsgram-container");

let currentRotation = 0;
const spinSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3");

function drawWheel(rotation = 0){
  const segments = 6;
  const angle = (2 * Math.PI) / segments;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(150,150);
  ctx.rotate(rotation);

  for(let i=0;i<segments;i++){
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,140,i*angle,(i+1)*angle);
    ctx.fillStyle = i % 2 === 0 ? "#00c853" : "#222";
    ctx.fill();
    ctx.stroke();
  }

  ctx.restore();

  ctx.beginPath();
  ctx.moveTo(150,10);
  ctx.lineTo(140,40);
  ctx.lineTo(160,40);
  ctx.fillStyle="#fff";
  ctx.fill();
}
drawWheel();

canvas.addEventListener("click", ()=>{
  if(spinning || rewardCooldown) return;

  spinning = true;
  spinSound.play();

  let spinDuration = 2500;
  let spinAngle = Math.random() * 360 + 1080;
  let start = null;

  function animateSpin(timestamp){
    if(!start) start = timestamp;
    let progress = timestamp - start;

    if(progress < spinDuration){
      let easeOut = 1 - Math.pow(1 - progress/spinDuration,3);
      currentRotation = (spinAngle * easeOut) * Math.PI/180;
      drawWheel(currentRotation);
      requestAnimationFrame(animateSpin);
    }else{
      spinning = false;
      showRewardAd();
    }
  }
  requestAnimationFrame(animateSpin);
});

function showRewardAd(){
  try{
    const randomBlock = rewardBlocks[Math.floor(Math.random()*rewardBlocks.length)];
    const rewardAd = window.Adsgram.init({blockId: randomBlock});
    rewardAd.show().finally(()=>{
      spinCount++;
      scratchMsg.innerText = "🎡 Tap wheel to spin (" + spinCount + "/6)";
      if(spinCount >= 6){
        showSpinTask();
      }
    });
  }catch(e){
    spinCount++;
    if(spinCount >= 6){
      showSpinTask();
    }
  }
}

function showSpinTask(){
  rewardCooldown = true;
  const randomTask = spinTaskBlocks[Math.floor(Math.random()*spinTaskBlocks.length)];
  container.innerHTML = `<adsgram-task class="spin-task" data-block-id="${randomTask}"></adsgram-task>`;
  container.classList.remove("hidden");

  const task = container.querySelector(".spin-task");
  task.addEventListener("reward", ()=>{
    points += 20;
    saveState();
    updateUI();
    scratchMsg.innerText = "🎉 You earned 20 points!";
    container.classList.add("hidden");
    setTimeout(resetSpin, 3000);
  });
}

function resetSpin(){
  spinCount = 0;
  rewardCooldown = false;
  scratchMsg.innerText = "🎡 Tap wheel to spin (0/6)";
  currentRotation = 0;
  drawWheel();
}

/* ================= TASK SYSTEM ================= */
let currentTaskIndex=0;
const taskIds=["task-23767","task-23768","task-23769","task-23774","task-23775"];

function loadTask(blockId){
  container.innerHTML=`<adsgram-task class="task" data-block-id="${blockId}"></adsgram-task>`;
  container.classList.remove("hidden");
  document.getElementById("taskIntro").classList.add("hidden");

  const task=container.querySelector(".task");
  task.addEventListener("reward",()=>{
    points += 1;
    saveState();
    updateUI();

    if(currentTaskIndex<taskIds.length-1){
      document.getElementById("nextTaskBtnContainer").classList.remove("hidden");
    }else{
      document.getElementById("finalTaskBtnContainer").classList.remove("hidden");
    }
  });
}

document.getElementById("startTasksBtn").addEventListener("click",()=>{
  currentTaskIndex=0;
  loadTask(taskIds[currentTaskIndex]);
});
document.getElementById("nextTaskBtn").addEventListener("click",()=>{
  currentTaskIndex++;
  document.getElementById("nextTaskBtnContainer").classList.add("hidden");
  loadTask(taskIds[currentTaskIndex]);
});
document.getElementById("finalTaskBtn").addEventListener("click",()=>{
  try{
    const rewardAd=window.Adsgram.init({blockId:"23731"});
    rewardAd.show().then(res=>{
      if(res.done){
        points+=1;
        saveState();
        updateUI();
      }
      document.getElementById("taskIntro").classList.remove("hidden");
      container.classList.add("hidden");
      document.getElementById("finalTaskBtnContainer").classList.add("hidden");
      currentTaskIndex=0;
    });
  }catch(e){
    document.getElementById("taskIntro").classList.remove("hidden");
    container.classList.add("hidden");
    document.getElementById("finalTaskBtnContainer").classList.add("hidden");
    currentTaskIndex=0;
  }
});

/* ================= WITHDRAW ================= */
document.getElementById("withdrawBtn").addEventListener("click",()=>{
  const method=document.getElementById("method").value;
  const address=document.getElementById("address").value.trim();
  const amount=parseInt(document.getElementById("amount").value);

  if(isNaN(amount)||amount<250000){
    alert("Minimum withdrawal is 250,000 points (~$59)");
    return;
  }
  if(points<amount){
    alert("Not enough points");
    return;
  }

  const user=webApp.initDataUnsafe.user||{};
  const msg=JSON.stringify({
    type:"withdraw_request",
    user_id:user.id,
    username:user.username||"No username",
    amount,method,address
  });
  Telegram.WebApp.sendData(msg);

  points-=amount;
  saveState();
  updateUI();
  alert("✅ Withdrawal request sent!");
});

document.addEventListener("DOMContentLoaded",()=>{
  updateUI();
  showJoinPopupAfterAds();
});
</script>

</body>
</html>
