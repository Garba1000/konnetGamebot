<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spin & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}
h1, h2 { margin-bottom: 10px; }
.section { margin-top: 10px; padding: 15px; background: #111; border-radius: 10px; }
.btn {
  display: inline-block;
  margin-top: 8px;
  padding: 10px 15px;
  border-radius: 8px;
  background: #00c853;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
}
.btn:active { transform: scale(0.95); }
.hidden { display: none; }
input, select {
  padding: 8px; margin: 5px 0; width: 100%; border-radius: 5px; border: none;
}
#joinPopup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  z-index: 9999;
}
canvas { border-radius: 10px; display: block; margin: 10px auto; }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<!-- JOIN POPUP -->
<div id="joinPopup">
  <h2>📢 Join Our Telegram Channel to Continue</h2>
  <p>You must join before using the app.</p>
  <div class="btn" onclick="joinChannelClicked()">👉 Join Channel</div>
</div>

<div id="mainPage" style="display:none;">

<h1>⚡ Spin & Earn Points</h1>
<p>Points: <span id="points">0</span> | Energy: <span id="energy">50</span></p>

<!-- SPIN SECTION -->
<div class="section">
  <canvas id="spinCanvas" width="300" height="300"></canvas>
  <p id="scratchMsg">🎡 Tap wheel to spin (0/6)</p>
</div>

<!-- CLAIM 200 POINTS BUTTON -->
<div class="section">
  <div id="claimContainer"></div>
</div>

<!-- TASK BUTTON -->
<div class="section">
  <div class="btn" id="taskBtn">📋 Task</div>
  <div id="taskContainer" class="hidden"></div>
</div>

<!-- WITHDRAW -->
<div class="section">
<h2>💳 Withdraw</h2>
<p><b>Minimum withdrawal is 10,000 points (~$60)</b></p>
<select id="method">
<option value="Litecoin">Litecoin</option>
<option value="USDT">USDT</option>
<option value="Payeer">Payeer</option>
<option value="Bank">Bank Account</option>
</select>
<input type="text" id="address" placeholder="Enter wallet or account"/>
<input type="number" id="amount" placeholder="Minimum 10000"/>
<div class="btn" id="withdrawBtn">Request Withdraw</div>
</div>

</div>

<script>
const webApp = Telegram.WebApp;

let points = Number(localStorage.getItem("points"));
let energy = Number(localStorage.getItem("energy"));
if (isNaN(points)) points = 0;
if (isNaN(energy)) energy = 50;

function updateUI(){
  document.getElementById("points").innerText = points;
  document.getElementById("energy").innerText = energy;
}
function saveState(){
  localStorage.setItem("points", points);
  localStorage.setItem("energy", energy);
}

/* JOIN CHANNEL */
function joinChannelClicked(){
  window.open("https://t.me/FoxiGrowbot?start=ref_6910486529","_blank");
  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainPage").style.display="block";
}

/* PRELOADED ADSGRAM REWARD BLOCKS (UNCHANGED) */
const rewardBlocks = ["24083","24084","24085"];
const spinTaskBlocks = ["task-24086","task-24087","task-24088","task-24089"];

function showSingleAd(){
  try{
    const randomBlock = rewardBlocks[Math.floor(Math.random()*rewardBlocks.length)];
    const rewardAd = window.Adsgram.init({blockId: randomBlock});
    rewardAd.show();
  }catch(e){}
}

/* SHOW JOIN POPUP AFTER PRELOADED AD (UNCHANGED) */
function showJoinPopupAfterAds(){
  try{
    const randomBlock = rewardBlocks[Math.floor(Math.random()*rewardBlocks.length)];
    const rewardAd = window.Adsgram.init({blockId: randomBlock});
    rewardAd.show().finally(()=>{
      document.getElementById("joinPopup").style.display="flex";
    });
  }catch(e){
    document.getElementById("joinPopup").style.display="flex";
  }
}

/* ON LOAD */
document.addEventListener("DOMContentLoaded",()=>{
  updateUI();
  showJoinPopupAfterAds();   // ✅ PRELOAD AD STILL RUNS FIRST
});
</script>

</body>
</html>
